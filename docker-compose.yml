version: '3.8'

services:
  medagent:
    build: .
    container_name: medagent
    ports:
      - "8000:8000"   # FastAPI
      - "7860:7860"   # Gradio
    volumes:
      - ./data:/app/data          # 持久化 ChromaDB 数据
      - ./.env:/app/.env          # 挂载环境变量文件
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
